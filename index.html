<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caterpillar Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .game-info {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 20px;
            color: white;
            font-size: 1.2em;
            font-weight: 500;
        }

        .score, .high-score {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }

        canvas {
            background: #4ade80;
            border: 3px solid #166534;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .controls {
            margin-top: 30px;
            color: white;
            font-size: 0.95em;
        }

        .controls p {
            margin-bottom: 10px;
            opacity: 0.9;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .game-over {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .game-over-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            color: white;
        }

        .game-over-content h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .game-over-content p {
            font-size: 1.5em;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .game-over-content button {
            font-size: 1.1em;
            padding: 15px 40px;
            background: white;
            color: #667eea;
        }

        .game-over-content button:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 Caterpillar Game</h1>

        <div class="game-info">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">High Score: <span id="high-score">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <p>Use arrow keys or WASD to control the caterpillar</p>
            <p>Eat the pink leaves to grow and earn points</p>
            <button onclick="resetGame()">New Game</button>
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <div class="game-over-content">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = true;
        let gameSpeed = 100;
        let gameLoop;

        document.getElementById('high-score').textContent = highScore;

        function spawnFood() {
            let newFood;
            let isOnSnake = true;
            while (isOnSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                isOnSnake = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
            }
            food = newFood;
        }

        function update() {
            if (!gameRunning) return;

            direction = nextDirection;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                spawnFood();
                // Increase difficulty slightly
                gameSpeed = Math.max(50, gameSpeed - 1);
                clearInterval(gameLoop);
                gameLoop = setInterval(update, gameSpeed);
            } else {
                snake.pop();
            }
        }

        function draw() {
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw caterpillar
            snake.forEach((segment, index) => {
                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;

                if (index === 0) {
                    // Head - yellow with glow
                    ctx.fillStyle = '#facc15';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#eab308';
                } else {
                    // Body - slightly darker yellow
                    ctx.fillStyle = '#fbbf24';
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = '#f59e0b';
                }
                ctx.fillRect(x, y, gridSize - 2, gridSize - 2);
            });

            // Draw eyes on head
            if (snake.length > 0) {
                const head = snake[0];
                const headX = head.x * gridSize + gridSize / 2;
                const headY = head.y * gridSize + gridSize / 2;

                ctx.fillStyle = '#000';
                ctx.shadowBlur = 0;
                // Left eye
                ctx.beginPath();
                ctx.arc(headX - 4, headY - 3, 2.5, 0, Math.PI * 2);
                ctx.fill();
                // Right eye
                ctx.beginPath();
                ctx.arc(headX + 4, headY - 3, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Tongue
                ctx.strokeStyle = '#ff1493';
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(headX, headY + 3);
                ctx.lineTo(headX - 2, headY + 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(headX, headY + 3);
                ctx.lineTo(headX + 2, headY + 8);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;

            // Draw food (pink leaves)
            ctx.fillStyle = '#ec4899';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#be185d';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameLoop_fn() {
            update();
            draw();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('high-score').textContent = highScore;
            }
        }

        function resetGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameRunning = true;
            gameSpeed = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'none';
            spawnFood();
            clearInterval(gameLoop);
            gameLoop = setInterval(gameLoop_fn, gameSpeed);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            // Arrow keys
            if (e.key === 'ArrowUp' && direction.y === 0) nextDirection = { x: 0, y: -1 };
            if (e.key === 'ArrowDown' && direction.y === 0) nextDirection = { x: 0, y: 1 };
            if (e.key === 'ArrowLeft' && direction.x === 0) nextDirection = { x: -1, y: 0 };
            if (e.key === 'ArrowRight' && direction.x === 0) nextDirection = { x: 1, y: 0 };

            // WASD keys
            if (key === 'w' && direction.y === 0) nextDirection = { x: 0, y: -1 };
            if (key === 's' && direction.y === 0) nextDirection = { x: 0, y: 1 };
            if (key === 'a' && direction.x === 0) nextDirection = { x: -1, y: 0 };
            if (key === 'd' && direction.x === 0) nextDirection = { x: 1, y: 0 };
        });

        // Start the game
        spawnFood();
        gameLoop = setInterval(gameLoop_fn, gameSpeed);
    </script>
</body>
</html>
